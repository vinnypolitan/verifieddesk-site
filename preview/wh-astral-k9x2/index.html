<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Widening Horizons — a concept study</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --sky-deep:#050B18; --sky-glow:#0A2A5E; --brand:#00488D;
  --star-gold:#E8B84B; --star-bright:#FFF3D6; --mist:#8FA9C9;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  background:var(--sky-deep); color:var(--mist);
  font-family:'Outfit',sans-serif; font-weight:300;
  overflow:hidden;
}
#sky{position:fixed;inset:0;display:block}
.nebula{position:fixed;inset:-20%;pointer-events:none;
  background:
    radial-gradient(38% 30% at 22% 30%, rgba(10,42,94,.55), transparent 70%),
    radial-gradient(30% 26% at 78% 64%, rgba(0,72,141,.35), transparent 70%),
    radial-gradient(24% 20% at 60% 18%, rgba(232,184,75,.05), transparent 70%);
  filter:blur(10px);
  animation:drift 90s ease-in-out infinite alternate;
  will-change:transform;
}
@keyframes drift{from{transform:translate3d(-1.5%,-1%,0) scale(1)}to{transform:translate3d(1.5%,1.2%,0) scale(1.04)}}

.wordmark{position:fixed;top:34px;left:40px;display:flex;align-items:center;gap:12px;z-index:3;
  opacity:0;animation:rise .9s .3s ease-out forwards}
.wordmark svg{display:block}
.wordmark span{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:19px;
  letter-spacing:.24em;color:var(--star-bright)}
.tag{position:fixed;top:40px;right:40px;z-index:3;font-size:11px;letter-spacing:.28em;
  color:rgba(143,169,201,.55);text-transform:uppercase;
  opacity:0;animation:rise .9s .5s ease-out forwards}

.stage{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:flex-end;padding-bottom:7vh;z-index:2;pointer-events:none}
h1{font-family:'Cormorant Garamond',serif;font-weight:500;color:var(--star-bright);
  font-size:clamp(30px,4.4vw,54px);line-height:1.12;text-align:center;letter-spacing:.01em;
  opacity:0;animation:rise 1.1s 2.4s ease-out forwards}
h1 em{font-style:italic;color:var(--star-gold)}
.sub{margin-top:14px;font-size:clamp(14px,1.35vw,17px);letter-spacing:.14em;
  text-transform:uppercase;color:var(--mist);
  opacity:0;animation:rise 1.1s 2.8s ease-out forwards}
form{margin-top:34px;display:flex;gap:10px;pointer-events:auto;
  opacity:0;animation:rise 1.1s 3.2s ease-out forwards}
input{
  width:min(320px,58vw);padding:14px 18px;font:400 16px 'Outfit',sans-serif;
  color:var(--star-bright);background:rgba(10,42,94,.25);
  border:1px solid rgba(143,169,201,.35);border-radius:2px;outline:none;
  letter-spacing:.04em;transition:border-color .3s, background .3s;
}
input::placeholder{color:rgba(143,169,201,.55)}
input:focus-visible{border-color:var(--star-gold);background:rgba(10,42,94,.45)}
button{
  padding:14px 26px;font:500 13px 'Outfit',sans-serif;letter-spacing:.22em;
  text-transform:uppercase;color:var(--sky-deep);background:var(--star-gold);
  border:0;border-radius:2px;cursor:pointer;transition:background .3s, transform .2s;
}
button:hover{background:var(--star-bright)}
button:focus-visible{outline:2px solid var(--star-bright);outline-offset:2px}
button:active{transform:translateY(1px)}
.reading{margin-top:20px;min-height:24px;font-size:15px;letter-spacing:.08em;
  color:var(--mist);opacity:0;transition:opacity .8s}
.reading.show{opacity:1}
.reading b{color:var(--star-gold);font-weight:500}
.foot{position:fixed;bottom:22px;left:0;right:0;text-align:center;font-size:11px;
  letter-spacing:.2em;color:rgba(143,169,201,.4);text-transform:uppercase;z-index:3;
  opacity:0;animation:rise 1s 3.6s ease-out forwards}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@media (max-width:640px){
  .wordmark{left:22px;top:24px}.tag{right:22px;top:28px}
  form{flex-direction:column;width:80vw}input{width:100%}
  .stage{padding-bottom:5vh}
}
@media (prefers-reduced-motion: reduce){
  .nebula{animation:none}
  .wordmark,.tag,h1,.sub,form,.foot{animation:none;opacity:1}
}
</style>
</head>
<body>
<canvas id="sky" aria-hidden="true"></canvas>
<div class="nebula" aria-hidden="true"></div>

<div class="wordmark">
  <svg width="26" height="26" viewBox="0 0 26 26" fill="none" aria-hidden="true">
    <circle cx="13" cy="13" r="5.2" fill="#E8B84B"/>
    <g stroke="#E8B84B" stroke-width="1.4" stroke-linecap="round">
      <line x1="13" y1="1.5" x2="13" y2="5"/><line x1="13" y1="21" x2="13" y2="24.5"/>
      <line x1="1.5" y1="13" x2="5" y2="13"/><line x1="21" y1="13" x2="24.5" y2="13"/>
      <line x1="4.9" y1="4.9" x2="7.3" y2="7.3"/><line x1="18.7" y1="18.7" x2="21.1" y2="21.1"/>
      <line x1="4.9" y1="21.1" x2="7.3" y2="18.7"/><line x1="18.7" y1="7.3" x2="21.1" y2="4.9"/>
    </g>
  </svg>
  <span>WIDENING&nbsp;HORIZONS</span>
</div>
<div class="tag">Concept study</div>

<div class="stage">
  <h1>Your numbers are written <em>in the stars</em>.</h1>
  <div class="sub">Professional numerology, in minutes</div>
  <form id="f" autocomplete="off">
    <label for="nm" style="position:absolute;left:-9999px">Type a name</label>
    <input id="nm" type="text" placeholder="Type a name" maxlength="40" inputmode="text">
    <button type="submit">Reveal</button>
  </form>
  <div class="reading" id="reading" role="status" aria-live="polite"></div>
</div>
<div class="foot">A design concept for wideninghorizons.com</div>

<script>
(() => {
const cv = document.getElementById('sky'), cx = cv.getContext('2d');
const RM = matchMedia('(prefers-reduced-motion: reduce)').matches;
let W, H, DPR;
function size(){
  DPR = Math.min(devicePixelRatio || 1, 2);
  W = innerWidth; H = innerHeight;
  cv.width = W * DPR; cv.height = H * DPR;
  cv.style.width = W + 'px'; cv.style.height = H + 'px';
  cx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
size(); addEventListener('resize', () => { size(); layout(); });

// ---------- background starfield ----------
let field = [];
function seedField(){
  field = [];
  const n = Math.round(W * H / 6500);
  for (let i = 0; i < n; i++) field.push({
    x: Math.random() * W, y: Math.random() * H,
    r: .4 + Math.random() * 1.1,
    tw: Math.random() * Math.PI * 2,
    ts: .3 + Math.random() * 1.2,
    d: .3 + Math.random() * .7          // parallax depth
  });
}
seedField();

// mouse parallax
let px = 0, py = 0, tx = 0, ty = 0;
if (!RM) addEventListener('pointermove', e => {
  tx = (e.clientX / W - .5) * 14; ty = (e.clientY / H - .5) * 10;
});

// ---------- digit constellations ----------
// each digit: array of strokes; stroke: array of [x,y] on 0..1 grid
const DIGITS = {
  1: [[[.38,.20],[.52,.10],[.52,.50],[.52,.88]], [[.38,.88],[.66,.88]]],
  2: [[[.34,.24],[.43,.12],[.58,.10],[.67,.22],[.63,.40],[.48,.57],[.35,.73],[.32,.88],[.68,.88]]],
  3: [[[.34,.18],[.50,.10],[.66,.20],[.60,.37],[.48,.46],[.63,.55],[.67,.72],[.51,.88],[.34,.80]]],
  4: [[[.57,.10],[.32,.58],[.74,.58]], [[.61,.34],[.61,.88]]],
  5: [[[.66,.10],[.37,.10],[.34,.44],[.52,.39],[.67,.51],[.66,.73],[.50,.88],[.34,.79]]],
  6: [[[.61,.12],[.44,.22],[.34,.46],[.34,.70],[.48,.88],[.63,.78],[.66,.59],[.51,.48],[.36,.58]]],
  7: [[[.32,.10],[.68,.10],[.53,.46],[.42,.88]]],
  8: [[[.50,.10],[.35,.22],[.44,.44],[.61,.56],[.65,.75],[.50,.88],[.35,.75],[.39,.56],[.56,.44],[.65,.22],[.50,.10]]],
  9: [[[.64,.40],[.49,.49],[.35,.38],[.36,.18],[.52,.10],[.63,.19],[.64,.40],[.60,.65],[.50,.88]]]
};
const MEANING = {
  1:'independence and new beginnings', 2:'partnership and diplomacy',
  3:'creative expression', 4:'foundation and discipline',
  5:'freedom and change', 6:'care and responsibility',
  7:'analysis and inner wisdom', 8:'power and achievement',
  9:'compassion and completion', 11:'intuition and illumination',
  22:'the master builder', 33:'the master teacher'
};

// Pythagorean expression number, master numbers kept
function expression(name){
  const s = name.toUpperCase().replace(/[^A-Z]/g, '');
  if (!s) return null;
  let t = 0;
  for (const ch of s) t += ((ch.charCodeAt(0) - 65) % 9) + 1;
  while (t > 9 && t !== 11 && t !== 22 && t !== 33)
    t = String(t).split('').reduce((a, b) => a + +b, 0);
  return t;
}

// build star/line model for a number (handles two-digit masters)
let stars = [], lines = [], born = performance.now();
function jitter(v){ return v + (Math.random() - .5) * .035; }
function layout(){ if (current) buildModel(current); }
let current = null;
function buildModel(num){
  current = num;
  stars = []; lines = [];
  const ds = String(num).split('').map(Number);
  const side = Math.min(W * .42, H * .52);
  const totalW = side * (ds.length === 1 ? .9 : 1.5);
  const x0 = W / 2 - totalW / 2;
  const y0 = H * .10;
  ds.forEach((d, di) => {
    const ox = x0 + di * side * .78;
    for (const stroke of DIGITS[d]) {
      let prev = null;
      for (const [nx, ny] of stroke) {
        const sx = ox + jitter(nx) * side * .9;
        const sy = y0 + jitter(ny) * side;
        const idx = stars.length;
        stars.push({ x: sx, y: sy, r: 2.2 + Math.random() * 1.6, tw: Math.random() * 6.28 });
        if (prev !== null) lines.push([prev, idx]);
        prev = idx;
      }
    }
  });
  born = performance.now();
}

// ---------- render loop ----------
let running = true;
document.addEventListener('visibilitychange', () => {
  running = !document.hidden;
  if (running) requestAnimationFrame(loop);
});
function loop(now){
  if (!running) return;
  cx.clearRect(0, 0, W, H);
  px += (tx - px) * .04; py += (ty - py) * .04;

  // field
  for (const s of field) {
    const a = .25 + .55 * Math.abs(Math.sin(s.tw + now * .001 * s.ts));
    cx.globalAlpha = a * s.d;
    cx.fillStyle = '#CFDCEE';
    cx.beginPath();
    cx.arc(s.x + px * s.d, s.y + py * s.d, s.r, 0, 6.28);
    cx.fill();
  }
  cx.globalAlpha = 1;

  // constellation
  const t = RM ? 9 : (now - born) / 1000;
  const starIn = Math.min(1, t / 1.1);
  const lineIn = Math.max(0, Math.min(1, (t - .9) / 1.4));
  const ease = x => 1 - Math.pow(1 - x, 3);

  // lines draw progressively
  const drawn = ease(lineIn) * lines.length;
  cx.lineWidth = 1;
  for (let i = 0; i < lines.length; i++) {
    const p = Math.max(0, Math.min(1, drawn - i));
    if (p <= 0) continue;
    const a = stars[lines[i][0]], b = stars[lines[i][1]];
    cx.strokeStyle = 'rgba(232,184,75,.55)';
    cx.shadowColor = 'rgba(232,184,75,.8)'; cx.shadowBlur = 6;
    cx.beginPath();
    cx.moveTo(a.x + px, a.y + py);
    cx.lineTo(a.x + px + (b.x - a.x) * p, a.y + py + (b.y - a.y) * p);
    cx.stroke();
    cx.shadowBlur = 0;
  }

  // constellation stars ignite staggered
  stars.forEach((s, i) => {
    const local = Math.max(0, Math.min(1, starIn * stars.length * 1.6 - i));
    if (local <= 0) return;
    const e = ease(local);
    const pulse = 1 + .12 * Math.sin(s.tw + now * .002);
    const g = cx.createRadialGradient(s.x + px, s.y + py, 0, s.x + px, s.y + py, s.r * 6 * pulse);
    g.addColorStop(0, 'rgba(255,243,214,' + .95 * e + ')');
    g.addColorStop(.25, 'rgba(232,184,75,' + .55 * e + ')');
    g.addColorStop(1, 'rgba(232,184,75,0)');
    cx.fillStyle = g;
    cx.beginPath();
    cx.arc(s.x + px, s.y + py, s.r * 6 * pulse, 0, 6.28);
    cx.fill();
  });

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ---------- interaction ----------
const reading = document.getElementById('reading');
function show(name, num){
  buildModel(num);
  reading.innerHTML = '<b>' + name + '</b> resolves to <b>' + num + '</b> · ' + MEANING[num];
  reading.classList.add('show');
}
document.getElementById('f').addEventListener('submit', e => {
  e.preventDefault();
  const raw = document.getElementById('nm').value.trim();
  const n = expression(raw);
  if (!n) { reading.innerHTML = 'Letters only — try a name.'; reading.classList.add('show'); return; }
  const nice = raw.replace(/\s+/g, ' ').split(' ')
    .map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
  show(nice, n);
});

// opening state: the name behind the brand
buildModel(expression('WIDENING HORIZONS'));
setTimeout(() => {
  reading.innerHTML = '<b>Widening Horizons</b> resolves to <b>2</b> · ' + MEANING[2];
  reading.classList.add('show');
}, RM ? 0 : 3600);
})();
</script>
</body>
</html>
